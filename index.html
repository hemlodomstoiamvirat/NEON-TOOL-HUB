<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Tools Hub</title>

<style>
body{
    background:#0a0a0a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:20px;
}

.logo{
    color:#00ffff;
    text-shadow:0 0 10px #00ffff,0 0 20px #00ffff;
}

.card{
    background:#111;
    border:1px solid #00ffff;
    border-radius:15px;
    padding:20px;
    margin:20px auto;
    max-width:500px;
    box-shadow:0 0 15px #00ffff;
}

input{
    width:80%;
    padding:10px;
    margin:10px;
    border-radius:10px;
    border:none;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#00ffff;
    font-weight:bold;
    cursor:pointer;
}

img{
    margin-top:15px;
    max-width:200px;
}
</style>
</head>

<body>

<h1 class="logo">⚡ NEON TOOLS HUB ⚡</h1>

<div class="card">
    <h2>QR Generator</h2>

    <input type="text" id="qrText"
    placeholder="Enter text or link">

    <br>

    <button onclick="generateQR()">
        Generate QR
    </button>

    <div id="qrResult"></div>
</div>

<div class="card">
    <h2>Barcode Generator</h2>

    <input type="text" id="barcodeText"
    placeholder="Enter barcode text">

    <br>

    <button onclick="generateBarcode()">
        Generate Barcode
    </button>

    <div id="barcodeResult"></div>
</div>

<div class="card">
    <h2>Download Center</h2>

    <input type="text" id="fileLink"
    placeholder="Paste your file link">

    <br>

    <button onclick="openLink()">
        Open Link
    </button>
</div>
<div class="card">
    <h2>PDF Generator</h2>

    <input type="text" id="pdfText"
    placeholder="Write text for PDF">

    <br><br>

    <button onclick="generatePDF()">
        Generate PDF
    </button>
</div>
<script>
function generatePDF(){
alert("PDF button clicked");
let text =
document.getElementById("pdfText").value;

let win = window.open("", "_blank");

win.document.write(`
<html>
<head>
<title>PDF</title>
</head>
<body style="font-family:Arial;padding:20px;">
<h2>Generated PDF</h2>
<p>${text}</p>
</body>
</html>
`);

win.document.close();

win.print();

}
function generateQR(){

let text =
document.getElementById("qrText").value;

document.getElementById("qrResult").innerHTML=
`<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(text)}">`;

}

function generateBarcode(){

let text =
document.getElementById("barcodeText").value;

document.getElementById("barcodeResult").innerHTML=
`<img src="https://barcodeapi.org/api/${encodeURIComponent(text)}">`;

}

function openLink(){

let link =
document.getElementById("fileLink").value;

window.open(link,"_blank");

}

</script>

</body>
</html>
<div class="card">
    <h2>PDF Generator</h2>

    <input type="text" id="pdfText"
    placeholder="Write text for PDF">

    <br>

    <button onclick="generatePDF()">
        Generate PDF
    </button>
</div>
<div class="card">
<h2>Admin Verification</h2>
<input type="password" id="adminKey" placeholder="Enter Secret Key">
<button onclick="verifyAdmin()">Verify</button>
<p id="verifyResult"></p>
</div>
